version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: device-mgmt-backend
    environment:
      - PROJECT_NAME=回收门店设备管理系统
      - DATABASE_URL=sqlite:///./data/devices.db
      - API_V1_PREFIX=/api/v1
      - BACKEND_CORS_ORIGINS=["http://localhost:3000","http://localhost:8000"]
    volumes:
      - db_data:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/metadata')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: device-mgmt-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  db_data:
    name: device-mgmt-db-data
